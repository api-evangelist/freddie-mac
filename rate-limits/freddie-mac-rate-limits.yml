description: Freddie Mac partner APIs enforce limits negotiated within Seller/Servicer or
  technology-partner agreements. Public, consolidated rate-limit documentation is not published.
notes: developer.freddiemac.com was not retrievable during reconciliation; specific per-API limits
  should be confirmed in the partner agreement or the live developer portal.
sources:
  - https://developer.freddiemac.com/
responseCodes:
  throttled: 429
limits:
  - name: Partner API limits
    scope: counterparty
    metric: varies
    limit: see partner agreement
policies:
  - name: Counterparty-scoped
    description: Limits apply per Seller/Servicer ID or partner credential and are governed by
      the partnership terms rather than a public tier.
  - name: Backoff on 429
    description: Standard exponential-backoff retry with Retry-After honoring is recommended for
      partner integrations.
