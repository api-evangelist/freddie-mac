specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Freddie Mac
providerId: freddie-mac
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Mortgage
  - Housing Finance
description: Freddie Mac partner APIs do not appear on a typical SaaS/usage billing surface; costs
  are embedded in counterparty fees (g-fees, Seller/Servicer fees) rather than per-API charges.
  FinOps focus is on partner-fee allocation and operational telemetry rather than usage-based
  spend.
notes: No public per-API pricing; FinOps shape inferred from a counterparty / partner-fee
  relationship.
sources:
  - https://developer.freddiemac.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Federal Home Loan Mortgage Corporation
serviceCategory: Financial Services
billingModel:
  pricingCategory: Partner / Counterparty Fees
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Freddie Mac
  ServiceCategory: Financial Services
  ProviderName: Freddie Mac
  PublisherName: Federal Home Loan Mortgage Corporation
  InvoiceIssuerName: Federal Home Loan Mortgage Corporation
  BillingCurrency: USD
meters:
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_product
      - seller_servicer_id
  - name: loans_evaluated
    unit: loan
    aggregation: sum
    dimensions:
      - product
  - name: partner_fees
    unit: USD
    aggregation: sum
    dimensions:
      - fee_type
principles:
  - name: Visibility
    description: Track Loan Product Advisor and related API usage by Seller/Servicer ID;
      reconcile against Freddie Mac partner statements.
  - name: Allocation
    description: Allocate API and loan-evaluation cost to originating channels and product lines.
  - name: Optimization
    description: Reuse decisions where permitted; minimize re-submissions; right-size partner
      tiering for actual loan volume.
  - name: Accountability
    description: Origination operations owns counterparty-fee variance review; align with
      capital-markets reporting.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
